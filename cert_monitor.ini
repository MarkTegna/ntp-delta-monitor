[DEFAULT]
# Certificate Expiry Monitor Configuration File

[monitor_settings]
# Default parallel limit for concurrent checks
default_parallel_limit = 10

# Default connection timeout in seconds
default_timeout = 10

# Days before expiry to flag as warning (yellow highlighting)
warning_days = 30

# Days before expiry to flag as critical (red highlighting)
critical_days = 7

# Default filter for "Filtered" sheet: show certs expiring within this many days
filter_days = 30

# Default filter for "Filtered" sheet: comma-separated issuer substrings to match
# Only certs with issuers containing any of these strings will appear on the filtered sheet
filter_issuers = Tegna SHA2 Issuing CA 01,Tegna Inc. Issuing

# Fallback ports to try when port 443 fails
# Comma-separated list of alternate HTTPS ports to check
fallback_ports = 8080,8443,3389

# Output directory for reports
output_directory = .\Reports

[email_settings]
# Email notification settings
send_email = false
smtp_server = relay.tgna.tegna.com
smtp_port = 25
smtp_use_tls = false
smtp_username = 
smtp_password = 
from_email = cert-monitor@tgna.tegna.com
to_email = moldham@tegna.com
