[DEFAULT]
# DNS Response Monitor Configuration File

[dns_settings]
# Domain for auto-discovery of DNS servers (A record lookup)
default_discovery_domain = tgna.tegna.com

# Fallback DNS servers if domain discovery fails
fallback_servers = 8.8.8.8,8.8.4.4,1.1.1.1

# Domain to query for testing DNS response times
# Use a domain with a small response set for reliable timing
query_domain = ntp1.tgna.tegna.com

[monitor_settings]
# Number of test iterations per server
default_iterations = 100

# DNS query timeout in seconds
default_timeout = 2

# Max concurrent workers
default_parallel_limit = 10

# Flag servers with avg response time above this (milliseconds)
variance_threshold_ms = 50

# Stop querying a server after this many consecutive failures (0 to disable)
# Prevents dead servers from wasting time on every iteration
skip_after_failures = 5

# Output directory for reports
output_directory = .\Reports

[email_settings]
# Email notification settings
send_email = false
smtp_server = relay.tgna.tegna.com
smtp_port = 25
smtp_use_tls = false
smtp_username = 
smtp_password = 
from_email = dns-monitor@tgna.tegna.com
to_email = moldham@tegna.com
