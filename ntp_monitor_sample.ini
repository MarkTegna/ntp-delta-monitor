# NTP Delta Monitor - Sample Configuration File
# Copy this file to 'ntp_monitor.ini' and modify as needed for your environment
#
# This file contains default settings for the NTP monitoring program.
# All settings are optional - the program will use built-in defaults if this file is missing.

[ntp_settings]
# Default reference NTP server for baseline time comparison
# This server is used as the reference point for calculating time deltas
# Examples:
#   - Corporate NTP server: ntp.company.com
#   - Public NTP servers: time.windows.com, pool.ntp.org, time.google.com
#   - Stratum 1 servers: time.nist.gov, time-a.nist.gov
default_reference_server = ntp1.tgna.tegna.com

# Default domain for auto-discovery of NTP servers
# When no server list file is provided, the program will query all A records
# from this domain and test each IP address as a potential NTP server
# Examples:
#   - Corporate domain: company.com
#   - Subdomain: ntp.company.com
#   - Regional domain: us.company.com
default_discovery_domain = tgna.tegna.com

# Fallback NTP servers if domain discovery fails
# Comma-separated list of NTP servers to use if A record discovery returns no results
# These should be reliable, accessible NTP servers for your environment
fallback_servers = ntp1.tgna.tegna.com,ntp2.tgna.tegna.com,ntp3.tgna.tegna.com,ntp4.tgna.tegna.com

[report_settings]
# Default output format for delta values
# Options: seconds, milliseconds
# - seconds: Decimal seconds with millisecond precision (e.g., 0.123)
# - milliseconds: Integer milliseconds (e.g., 123)
default_format = milliseconds

# Default number of concurrent NTP queries
# Range: 1-100
# Higher values = faster processing but more network load
# Lower values = slower processing but less network impact
# Recommended: 10-20 for most environments
default_parallel_limit = 10

# Default NTP query timeout in seconds
# Range: 1-300
# Higher values = more patient with slow servers
# Lower values = faster overall processing
# Recommended: 30 for most environments, 60 for slow networks
default_timeout = 30

[advanced_settings]
# Sort XLSX output by variance from zero (highest to lowest absolute delta)
# true: Results sorted by time variance (most problematic servers first)
# false: Results in original processing order
# Recommended: true for easier identification of problem servers
sort_by_variance = true

# Maximum number of results to display in variance sorting
# This setting is reserved for future use
max_variance_display = 100

[email_settings]
# Email notification settings
# Enable or disable email notifications after monitoring completes
send_email = true

# SMTP server configuration
smtp_server = relay.tgna.tegna.com
smtp_port = 25
smtp_use_tls = false
smtp_username = 
smtp_password = 

# Email addresses
from_email = ntp-monitor@tgna.tegna.com
to_email = moldham@tegna.com

# Email alert thresholds
# If any server has a delta higher than this threshold (in seconds), 
# the subject will change from "NTP REPORT" to "NTP ERROR"
error_threshold_seconds = 0.2

[examples]
# Example configurations for different environments:

# Corporate Environment Example:
# default_reference_server = ntp.company.com
# default_discovery_domain = company.com
# fallback_servers = ntp1.company.com,ntp2.company.com
# default_parallel_limit = 20
# default_timeout = 15

# Public NTP Monitoring Example:
# default_reference_server = time.nist.gov
# default_discovery_domain = pool.ntp.org
# fallback_servers = time.windows.com,time.google.com,pool.ntp.org
# default_format = milliseconds
# default_parallel_limit = 50

# Slow Network Environment Example:
# default_reference_server = time.windows.com
# default_parallel_limit = 5
# default_timeout = 60
# sort_by_variance = true

# High-Performance Environment Example:
# default_parallel_limit = 100
# default_timeout = 10
# default_format = milliseconds

# Email Configuration Examples:

# Corporate SMTP with Authentication:
# smtp_server = mail.company.com
# smtp_port = 587
# smtp_use_tls = true
# smtp_username = ntp-monitor@company.com
# smtp_password = your_password
# from_email = ntp-monitor@company.com
# to_email = admin@company.com

# Internal Relay Server (No Authentication):
# smtp_server = relay.company.com
# smtp_port = 25
# smtp_use_tls = false
# from_email = ntp-monitor@company.com
# to_email = netops@company.com